# Label descriptions configuration
# Each label can have a description that will be posted as a comment when the label is applied
# Optional: Set 'close: true' to automatically close the issue/PR when the label is applied

labels:
  - name: ucm readme
    description: |
      ## Please test with the latest UCM configuration

      Thank you for your report! Before we dig deeper, could you please check whether the issue is already resolved in the latest UCM configuration files?

      Please follow the instructions in the **README** to fetch and test the latest configuration:
      https://github.com/alsa-project/alsa-ucm-conf/blob/master/README.md

      ---

      **Note for users on older distributions:** The latest UCM configuration files require a recent version of `alsa-lib` to work correctly. If your distribution ships an older version of `alsa-lib`, the latest configuration from this repository may not be compatible with your system.

      In that case, we kindly ask you to reach out to your **distribution's support channels** for assistance — they are best placed to provide a configuration that matches the version of `alsa-lib` included in your release. We appreciate your understanding!

  - name: ucm traces
    description: |
      ## Please provide UCM traces

      To help us diagnose this issue, please run the following command and paste the output here:

      ```bash
      LIBASOUND_DEBUG="ucm:trace" alsaucm -c hw:0 dump text
      ```

      > **Note:** Replace `0` with the number of your problematic sound card. To find the correct number, run:
      > ```bash
      > cat /proc/asound/cards
      > ```
      > Each card is listed with its index on the left — use that number in place of `0` in the command above.

  - name: alsa info
    description: |
      ## Please attach ALSA system information

      To help us analyze this issue, please run the following command and attach the generated file to this issue:

      ```bash
      alsa-info.sh --no-upload
      ```

      The script saves the report to `/tmp/alsa-info.txt`.

      **How to attach the file to this issue:**
      1. Open the comment box below (or edit your original report)
      2. Drag and drop `/tmp/alsa-info.txt` into the text area, **or** click the paperclip icon / "Attach files" link and select the file
      3. GitHub will upload it and insert a link — then submit the comment

      > **Note:** If GitHub rejects the `.txt` extension, rename the file to `alsa-info.txt.gz` after compressing it:
      > ```bash
      > gzip -k /tmp/alsa-info.txt
      > ```
      > Then attach `/tmp/alsa-info.txt.gz`.

  - name: kernel driver
    description: |
      ## ALSA Linux kernel driver work

      **Note:** This issue does not appear to be related to this repository, but rather seems to be an ALSA kernel driver issue.

      Please direct ALSA driver related discussions to the linux-sound@vger.kernel.org mailing list.

      **Bugtracker:** https://bugzilla.kernel.org (Audio component)

      For kernel patches, please see: https://www.kernel.org/doc/html/latest/process/submitting-patches.html

  - name: signed off by
    description: |
      ## Missing correct Signed-off-by line

      This pull request has commits that are missing proper `Signed-off-by` lines or use invalid email addresses.

      **Requirements:**
      - Each commit must include at least one `Signed-off-by: Your Name <your.email@example.com>` line
      - Commit author email must appear in at least one Signed-off-by line
      - Commit committer email must appear in at least one Signed-off-by line (if not a GitHub bot)
      - Multiple Signed-off-by lines are allowed for co-authored commits
      - Anonymous GitHub emails (like `@users.noreply.github.com`) are not allowed
      - The Signed-off-by line indicates that you agree to the Developer Certificate of Origin (DCO)

      **How to fix:**
      ```bash
      # 1. Configure your git identity first (if needed):
      git config user.name "Your Name"
      git config user.email "your.email@example.com"

      # 2. For adding Signed-off-by to the last commit:
      git commit --amend --signoff

      # 3. For adding Signed-off-by to multiple commits:
      git rebase -i HEAD~N --signoff

      # 4. If commit author email is wrong, fix it:
      # For the last commit only:
      git commit --amend --author="Your Name <your.email@example.com>" --signoff

      # For multiple commits:
      git rebase -i HEAD~N
      # Mark commits as 'edit', then for each:
      git commit --amend --author="Your Name <your.email@example.com>" --signoff
      git rebase --continue

      # 5. For co-authored commits, add multiple Signed-off-by lines manually:
      git commit --amend
      # Then add in the commit message:
      # Signed-off-by: Author One <author1@example.com>
      # Signed-off-by: Author Two <author2@example.com>

      # 6. Finally, force push your changes:
      git push --force-with-lease
      ```

      **Reference:** [Developer Certificate of Origin](https://developercertificate.org/)

  - name: invalid
    close: true
    description: |
      ## Invalid Issue/Pull Request

      This issue or pull request does not appear to be valid. It may be:
      - Not related to this project
      - Lacking sufficient information to address
      - A duplicate of an existing issue
      - Incorrectly formatted or unclear

      **Note:** If you believe this was closed in error or you have additional information that would help address this issue, please feel free to reopen it with more details.

  - name: wontfix
    close: true
    description: |
      ## Will Not Fix

      We've decided not to pursue this at this time.

      **Note:** If circumstances change or you have new information, please feel free to reopen for further discussion.

# Signed-off-by validation configuration
sob_validation:
  # Email patterns to deny (supports wildcards)
  denied_emails:
    - '*@users.noreply.github.com'
    # Add more patterns as needed:
    # - '*@example-blocked-domain.com'
    # - 'noreply@*'
